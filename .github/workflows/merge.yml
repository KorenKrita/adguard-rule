name: Merge AdGuard Rules

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 00:00 UTC
  workflow_dispatch:      # 手动触发

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run merger
      run: |
        python -m src.main | tee merger_output.log
        # 解析统计信息到环境变量
        grep "FILTER_TOTAL=" merger_output.log | tail -1 >> $GITHUB_ENV
        grep "FILTER_COUNT=" merger_output.log | tail -1 >> $GITHUB_ENV
        grep "WHITELIST_TOTAL=" merger_output.log | tail -1 >> $GITHUB_ENV
        grep "WHITELIST_COUNT=" merger_output.log | tail -1 >> $GITHUB_ENV
        grep "DNS_TOTAL=" merger_output.log | tail -1 >> $GITHUB_ENV
        grep "DNS_COUNT=" merger_output.log | tail -1 >> $GITHUB_ENV
        # 变体统计
        grep "DNS_FULL_COUNT=" merger_output.log | tail -1 >> $GITHUB_ENV
        grep "FILTER_LITE_COUNT=" merger_output.log | tail -1 >> $GITHUB_ENV
        grep "DNS_LITE_COUNT=" merger_output.log | tail -1 >> $GITHUB_ENV
        grep "FILTER_FULL_COUNT=" merger_output.log | tail -1 >> $GITHUB_ENV
        grep "DNS_FULL_FILTERED=" merger_output.log | tail -1 >> $GITHUB_ENV
        grep "FILTER_LITE_FILTERED=" merger_output.log | tail -1 >> $GITHUB_ENV
        grep "DNS_LITE_FILTERED=" merger_output.log | tail -1 >> $GITHUB_ENV
        grep "FILTER_FULL_FILTERED=" merger_output.log | tail -1 >> $GITHUB_ENV

    - name: Get current timestamp
      id: timestamp
      run: |
        echo "time=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        # 计算去重数量
        FILTER_FILTERED=$((FILTER_TOTAL - FILTER_COUNT))
        WHITELIST_FILTERED=$((WHITELIST_TOTAL - WHITELIST_COUNT))
        DNS_FILTERED=$((DNS_TOTAL - DNS_COUNT))

        git add output/ config.yaml

        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "chore: 🔄 更新规则 ${{ steps.timestamp.outputs.time }}

        📊 规则统计:
        - Filter: ${FILTER_COUNT} 条 (去重 ${FILTER_FILTERED})
        - DNS: ${DNS_COUNT} 条 (去重 ${DNS_FILTERED})
        - Whitelist: ${WHITELIST_COUNT} 条 (去重 ${WHITELIST_FILTERED})

        🔀 变体统计:
        - DNS Full: ${DNS_FULL_COUNT} 条 (去重 ${DNS_FULL_FILTERED})
        - Filter Lite: ${FILTER_LITE_COUNT} 条 (去重 ${FILTER_LITE_FILTERED})
        - DNS Lite: ${DNS_LITE_COUNT} 条 (去重 ${DNS_LITE_FILTERED})
        - Filter Full: ${FILTER_FULL_COUNT} 条 (去重 ${FILTER_FULL_FILTERED})"
        git push
