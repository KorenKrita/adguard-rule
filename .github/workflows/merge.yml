name: Merge AdGuard Rules

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 02:00 UTC
  workflow_dispatch:      # 手动触发

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pyyaml requests

    - name: Run merger
      run: |
        python -m src.main

    - name: Get current timestamp
      id: timestamp
      run: |
        echo "time=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

    - name: Commit and push changes
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        FILTER_COUNT=$(grep "^! Total:" output/filter.txt | head -1 | sed 's/.*Total: \([0-9]*\).*/\1/' || echo 0)
        WHITELIST_COUNT=$(grep "^! Total:" output/whitelist.txt | head -1 | sed 's/.*Total: \([0-9]*\).*/\1/' || echo 0)
        DNS_COUNT=$(grep "^! Total:" output/dns.txt | head -1 | sed 's/.*Total: \([0-9]*\).*/\1/' || echo 0)

        git add output/

        if git diff --cached --quiet; then
          echo "No changes to commit"
          exit 0
        fi

        git commit -m "Update rules: filter=${FILTER_COUNT}, whitelist=${WHITELIST_COUNT}, dns=${DNS_COUNT} [${{ steps.timestamp.outputs.time }}]"
        git push
